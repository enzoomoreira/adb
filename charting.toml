  # Configuracao do tema Agora para chartkit
  #
  # Este arquivo configura o chartkit para usar o tema visual padrao do Agora.
  # O chartkit detecta automaticamente este arquivo na raiz do projeto.

  [branding]
  company_name = "Ágora Investimentos"
  footer_format = "Fonte: {source}, {company_name}"
  footer_format_no_source = "{company_name}"

  [colors]
  # Paleta verde Ágora
  primary = "#00464D"
  secondary = "#006B6B"
  tertiary = "#008B8B"
  quaternary = "#20B2AA"
  quinary = "#5F9EA0"
  senary = "#2E8B57"
  text = "#00464D"
  grid = "lightgray"
  background = "white"
  positive = "#00464D"
  negative = "#8B0000"
  moving_average = "#888888"

  [fonts]
  # Fonte Bradesco Sans
  file = "fonts/BradescoSans-Light.ttf"

  [fonts.sizes]
  default = 11
  title = 18
  footer = 9
  axis_label = 11

  [layout]
  figsize = [10.0, 6.0]
  dpi = 300

  [layout.footer]
  x = 0.01
  y = 0.01
  color = "gray"

  [layout.title]
  padding = 20
  weight = "bold"

  [lines]
  main_width = 2.0
  overlay_width = 1.5
  reference_style = "--"

  [bars]
  width_default = 0.8
  width_monthly = 20
  width_annual = 300

  [markers]
  scatter_size = 30

  [paths]
  outputs_dir = "data/outputs"